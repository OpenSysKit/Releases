name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build All + Package + Release
    runs-on: windows-2022

    steps:
      # ── Checkout 各仓库 ──────────────────────────────────────
      - name: Checkout releases repo
        uses: actions/checkout@v4
        with:
          path: releases

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: OpenSysKit/new-FrontEnd
          path: frontend

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: OpenSysKit/BackEnd
          path: backend

      - name: Checkout driver
        uses: actions/checkout@v4
        with:
          repository: OpenSysKit/Driver
          path: driver

      # ── 工具链 ──────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: backend/go.sum

      # ── 构建前端 ────────────────────────────────────────────
      - name: Build frontend
        shell: pwsh
        run: |
          dotnet publish frontend\OpenSysKit.UI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=false `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugSymbols=false `
            -p:DebugType=None `
            -o dist

      - name: Sign frontend executable
        shell: pwsh
        env:
          CODESIGN_PFX: ${{ secrets.CODESIGN_PFX }}
          CODESIGN_PASSWORD: ${{ secrets.CODESIGN_PASSWORD }}
        run: |
          if (-not $env:CODESIGN_PFX) { throw "CODESIGN_PFX 未设置，拒绝发布未签名产物" }
          if (-not $env:CODESIGN_PASSWORD) { throw "CODESIGN_PASSWORD 未设置" }
          $certPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          $b64 = $env:CODESIGN_PFX -replace '\s', ''
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($b64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found" }
          & $signtool.FullName sign `
            /fd SHA256 `
            /f $certPath `
            /p $env:CODESIGN_PASSWORD `
            /tr http://timestamp.digicert.com `
            /td SHA256 `
            "dist\OpenSysKit.UI.exe"
          if ($LASTEXITCODE -ne 0) { throw "前端签名失败" }
          $sig = Get-AuthenticodeSignature "dist\OpenSysKit.UI.exe"
          if (-not $sig.SignerCertificate) { throw "前端签名校验失败" }
          Remove-Item $certPath -Force

      # ── 构建驱动 ────────────────────────────────────────────
      - name: Build driver
        shell: pwsh
        run: |
          cmake -B driver\build -S driver -G "Visual Studio 17 2022" -A x64
          cmake --build driver\build --config Release
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "driver\build\Release\OpenSysKit.sys" "dist\OpenSysKit.sys"

      # ── 计算前端 SHA256 ─────────────────────────────────────
      - name: Compute frontend SHA256
        id: frontend_hash
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Path "dist\OpenSysKit.UI.exe" -Algorithm SHA256).Hash.ToLower()
          echo "sha256=$hash" >> $env:GITHUB_OUTPUT
          Write-Host "Frontend SHA256: $hash"

      - name: Generate backend Windows resources
        shell: pwsh
        run: .\scripts\generate-winres.ps1 -RootPath $PWD
        working-directory: backend

      # ── 构建后端 ────────────────────────────────────────────
      - name: Build backend
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $buildTime = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $feHash = "${{ steps.frontend_hash.outputs.sha256 }}"
          $ldflags = "-H=windowsgui -s -w -X main.version=$version -X main.buildTime=$buildTime"
          if ($feHash) {
            $ldflags += " -X main.frontendSHA256=$feHash"
          }
          go build -ldflags "$ldflags" -o ..\dist\OpenSysKit.exe .\cmd\server
        working-directory: backend

      # ── 复制 DriverLoader.sys ───────────────────────────────
      - name: Copy DriverLoader.sys
        shell: pwsh
        run: Copy-Item "backend\assets\DriverLoader.sys" "dist\DriverLoader.sys"

      # ── 代码签名 ────────────────────────────────────────────
      - name: Sign backend executable
        shell: pwsh
        env:
          CODESIGN_PFX: ${{ secrets.CODESIGN_PFX }}
          CODESIGN_PASSWORD: ${{ secrets.CODESIGN_PASSWORD }}
        run: |
          if (-not $env:CODESIGN_PFX) { throw "CODESIGN_PFX 未设置，拒绝发布未签名产物" }
          if (-not $env:CODESIGN_PASSWORD) { throw "CODESIGN_PASSWORD 未设置" }
          $certPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          $b64 = $env:CODESIGN_PFX -replace '\s', ''
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($b64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found" }
          & $signtool.FullName sign `
            /fd SHA256 `
            /f $certPath `
            /p $env:CODESIGN_PASSWORD `
            /tr http://timestamp.digicert.com `
            /td SHA256 `
            "dist\OpenSysKit.exe"
          if ($LASTEXITCODE -ne 0) { throw "后端签名失败" }
          $sig = Get-AuthenticodeSignature "dist\OpenSysKit.exe"
          if (-not $sig.SignerCertificate) { throw "后端签名校验失败" }
          Remove-Item $certPath -Force

      - name: List dist contents
        shell: pwsh
        run: Get-ChildItem dist\ -Recurse | Format-Table Name, Length

      # ── 打包便携版 ZIP ──────────────────────────────────────
      - name: Create portable ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path dist\* -DestinationPath "OpenSysKit-win-x64.zip" -CompressionLevel Optimal

      # ── 构建 MSI 安装包 ────────────────────────────────────
      - name: Install WiX Toolset
        shell: pwsh
        run: dotnet tool install --global wix --version 5.0.2

      - name: Add WiX extensions
        shell: pwsh
        run: |
          wix extension add -g WixToolset.UI.wixext/5.0.1
          wix extension add -g WixToolset.Util.wixext/5.0.1

      - name: Inject version into WiX
        id: wix_ver
        shell: pwsh
        run: |
          $ver = "${{ inputs.version }}" -replace '^v', ''
          $parts = $ver -split '\.'
          while ($parts.Count -lt 3) { $parts += '0' }
          $msiVer = ($parts[0..2]) -join '.'
          $wxi = Get-Content "releases\installer\Variables.wxi" -Raw
          $wxi = $wxi -replace 'ProductVersion = "[\d.]+"', "ProductVersion = `"$msiVer`""
          Set-Content "releases\installer\Variables.wxi" $wxi
          Write-Host "MSI version: $msiVer"
          $msiName = "OpenSysKit-Setup-x64-${{ inputs.version }}.msi"
          echo "msi_name=$msiName" >> $env:GITHUB_OUTPUT

      - name: Build MSI
        shell: pwsh
        run: |
          $msiName = "${{ steps.wix_ver.outputs.msi_name }}"
          wix build `
            "releases\installer\Package.wxs" `
            -d DistDir="$PWD\dist" `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext `
            -culture zh-CN `
            -loc "releases\installer\zh-CN.wxl" `
            -o $msiName

      # ── 生成 Release Notes ──────────────────────────────────
      - name: Generate release notes
        id: release_notes
        shell: pwsh
        run: |
          $json = Get-Content "releases\release-notes.json" | ConvertFrom-Json
          $md = "# OpenSysKit ${{ inputs.version }}`n`n"
          $md += "> $($json.highlights)`n`n"
          $md += "## 新功能`n`n"
          foreach ($f in $json.features) {
            $md += "- **$($f.title)** — $($f.description)`n"
          }
          if ($json.fixes.Count -gt 0) {
            $md += "`n## 修复`n`n"
            foreach ($f in $json.fixes) {
              $md += "- $($f.title): $($f.description)`n"
            }
          }
          if ($json.known_issues.Count -gt 0) {
            $md += "`n## 已知问题`n`n"
            foreach ($i in $json.known_issues) {
              $md += "- $i`n"
            }
          }
          $md += "`n---`n`n"
          $md += "| 文件 | 说明 |`n|------|------|`n"
          $msiName = "${{ steps.wix_ver.outputs.msi_name }}"
          $md += "| ``OpenSysKit-win-x64.zip`` | 便携版（解压即用） |`n"
          $md += "| ``$msiName`` | 安装版（中文引导） |`n"
          $md += "| ``OpenSysKit-Driver-Doc-${{ inputs.version }}.docx`` | 驱动开发文档 |`n"
          Set-Content "release-body.md" $md -Encoding UTF8
          Write-Host $md

      # ── 生成驱动文档 ────────────────────────────────────────
      - name: Generate driver documentation
        shell: pwsh
        run: |
          Set-Location driver
          npm install --silent
          $docName = "OpenSysKit-Driver-Doc-${{ inputs.version }}.docx"
          node generate.js doc-config.json "..\$docName"
          Write-Host "驱动文档已生成: $docName"

      # ── 发版 ────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: OpenSysKit ${{ inputs.version }}
          body_path: release-body.md
          draft: false
          prerelease: false
          files: |
            OpenSysKit-win-x64.zip
            OpenSysKit-Setup-x64-${{ inputs.version }}.msi
            OpenSysKit-Driver-Doc-${{ inputs.version }}.docx
